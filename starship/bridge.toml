# ══════════════════════════════════════════════════════════════
#  BRIDGE — futuristic command-console prompt
#  Palette: cyan / white / blue / subtle orange · JetBrainsMono NF
# ══════════════════════════════════════════════════════════════
add_newline = true
palette = "bridge"
command_timeout = 1000

[palettes.bridge]
cyan   = "#7dd3fc"
blue   = "#7aa2f7"
white  = "#c0caf5"
orange = "#ff9e64"
dim    = "#3b4261"

format = """
[╭─](cyan) \
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$rust\
$nodejs\
$docker_context\
$kubernetes\
$fill\
$jobs\
${custom.claude}\
${custom.codex}\
${custom.opencode}\
$cmd_duration\
$status
[╰─](cyan)$character"""

[fill]
symbol = " "

# ── directory ─────────────────────────────────────
[directory]
format = "[](cyan)[ $path](bold white)[$read_only](orange) "
read_only = " 󰌾"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "…/"

# ── git ───────────────────────────────────────────
[git_branch]
symbol = " "
format = "[│](dim) [$symbol$branch](cyan) "

[git_status]
format = "[$all_status$ahead_behind](orange)"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ── languages ─────────────────────────────────────
[python]
symbol = " "
format = "[│](dim) [$symbol$version](blue) "

[rust]
symbol = " "
format = "[│](dim) [$symbol$version](orange) "

[nodejs]
symbol = " "
format = "[│](dim) [$symbol$version](cyan) "

# ── infra ─────────────────────────────────────────
[docker_context]
symbol = " "
only_with_files = true
format = "[│](dim) [$symbol$context](blue) "

[kubernetes]
disabled = false
symbol = "☸ "
format = "[│](dim) [$symbol$context](cyan) "

# ── right-side telemetry ──────────────────────────
# Claude usage: 5-hour block reset + weekly window remaining.
# Reads a 5-minute file cache, so this costs ~25ms per prompt.
[custom.claude]
command = '"$HOME/.dotfiles/bin/claude-usage" --prompt'
when = true
format = "[$output](blue)[ │](dim) "

# Codex weekly quota, read from its local session logs (see bin/codex-usage).
# Hidden when Codex has never run on this machine.
[custom.codex]
command = '"$HOME/.dotfiles/bin/codex-usage" --short'
when = 'test -d "$HOME/.codex/sessions"'
format = "[ᗢ $output](orange)[ │](dim) "

# opencode bills per token rather than against a quota, so this shows spend.
# `when` requires non-empty output, otherwise a fresh install with no sessions
# would render a bare symbol with nothing after it.
[custom.opencode]
command = '"$HOME/.dotfiles/bin/opencode-usage" --short'
when = 'test -n "$("$HOME/.dotfiles/bin/opencode-usage" --short 2>/dev/null)"'
format = "[◆ $output](white)[ │](dim) "


[cmd_duration]
min_time = 500
format = "[󱎫 $duration](white)[ │](dim) "

# Background jobs — easy to forget one is running, and these are usually
# long builds or agent runs worth knowing about.
[jobs]
symbol = "󰑮 "
number_threshold = 1
format = "[$symbol$number](orange)[ │](dim) "

# Non-zero exit codes, spelled out. The prompt arrow turns red on failure but
# doesn't say whether it was a 1 or a 130.
[status]
disabled = false
symbol = "✗"
format = "[$symbol$status](orange)[ │](dim) "

# Mid-rebase, mid-merge, mid-cherry-pick — the state it's easiest to forget
# you're in, and the most costly to forget.
[git_state]
format = "[$state( $progress_current/$progress_total)](bold orange) "


# ── prompt arrow ──────────────────────────────────
[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold orange)"
vicmd_symbol = "[❮](bold blue)"
