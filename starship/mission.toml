# ══════════════════════════════════════════════════════════════
#  MISSION — NASA Mission-Control checklist prompt
#  Vertical │-stacked readout · cyan/blue · JetBrainsMono NF
#  Empty modules self-collapse (no blank │ lines).
# ══════════════════════════════════════════════════════════════
add_newline = true
palette = "mission"

[palettes.mission]
cyan   = "#7dd3fc"
blue   = "#7aa2f7"
white  = "#c0caf5"
orange = "#ff9e64"
dim    = "#3b4261"

format = """
[╭─ ](cyan)[🚀 ](bold)$username$hostname\
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$kubernetes\
$aws\
$cmd_duration\
$battery\
$time
[╰─](cyan)$character"""

# ── header: user @ host ───────────────────────────
[username]
show_always = true
style_user = "bold cyan"
style_root = "bold orange"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "blue"
format = "[@$hostname]($style)"

# ── each row: leading newline + │ so empties vanish ─
[directory]
format = "\n[│ ](dim)[📂 ](cyan)[$path]($style)[$read_only](orange)"
style = "bold white"
read_only = " 🔒"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "🌿 "
format = "\n[│ ](dim)[$symbol$branch](blue)"

[git_status]
format = "[ $all_status$ahead_behind](orange)"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = "🐍 "
format = "\n[│ ](dim)[$symbol$version](cyan)"

[rust]
symbol = "🦀 "
format = "\n[│ ](dim)[$symbol$version](orange)"

[nodejs]
symbol = "⬢ "
format = "\n[│ ](dim)[$symbol$version](cyan)"

[kubernetes]
disabled = false
symbol = "☸ "
format = "\n[│ ](dim)[$symbol$context](blue)"

[aws]
symbol = "☁ "
format = "\n[│ ](dim)[$symbol$profile( $region)](cyan)"

[cmd_duration]
min_time = 0
show_milliseconds = true
format = "\n[│ ](dim)[⏱ $duration](white)"

[battery]
full_symbol = "🔋 "
charging_symbol = "🔌 "
discharging_symbol = "🔋 "
format = "\n[│ ](dim)[$symbol$percentage]($style)"
[[battery.display]]
threshold = 25
style = "orange"
[[battery.display]]
threshold = 100
style = "white"

[time]
disabled = false
time_format = "%R"
format = "\n[│ ](dim)[🕐 $time](blue)"

# ── prompt arrow ──────────────────────────────────
[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold orange)"
vicmd_symbol = "[❮](bold blue)"
