# ══════════════════════════════════════════════════════════════
#  MISSION — NASA Mission-Control checklist prompt
#  Vertical │-stacked readout · cyan/blue · JetBrainsMono NF
#  Empty modules self-collapse (no blank │ lines).
# ══════════════════════════════════════════════════════════════
add_newline = true
palette = "mission"

[palettes.mission]
cyan   = "#7dd3fc"
blue   = "#7aa2f7"
white  = "#c0caf5"
orange = "#ff9e64"
dim    = "#3b4261"

format = """
[╭─ ](cyan)[🚀 ](bold)$username$hostname\
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$kubernetes\
$aws\
${custom.claude}\
${custom.codex}\
${custom.opencode}\
$jobs\
$cmd_duration\
$status
[╰─](cyan)$character"""

# ── header: user @ host ───────────────────────────
[username]
show_always = true
style_user = "bold cyan"
style_root = "bold orange"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "blue"
format = "[@$hostname]($style)"

# ── each row: leading newline + │ so empties vanish ─
[directory]
format = "\n[│ ](dim)[📂 ](cyan)[$path]($style)[$read_only](orange)"
style = "bold white"
read_only = " 🔒"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
symbol = "🌿 "
format = "\n[│ ](dim)[$symbol$branch](blue)"

[git_status]
format = "[ $all_status$ahead_behind](orange)"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
symbol = "🐍 "
format = "\n[│ ](dim)[$symbol$version](cyan)"

[rust]
symbol = "🦀 "
format = "\n[│ ](dim)[$symbol$version](orange)"

[nodejs]
symbol = "⬢ "
format = "\n[│ ](dim)[$symbol$version](cyan)"

[kubernetes]
disabled = false
symbol = "☸ "
format = "\n[│ ](dim)[$symbol$context](blue)"

[aws]
symbol = "☁ "
format = "\n[│ ](dim)[$symbol$profile( $region)](cyan)"

[cmd_duration]
min_time = 0
show_milliseconds = true
format = "\n[│ ](dim)[⏱ $duration](white)"



# ── prompt arrow ──────────────────────────────────
[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold orange)"
vicmd_symbol = "[❮](bold blue)"

# ── agent usage ───────────────────────────────────
# Same meters as the bridge preset, so switching prompts doesn't lose them.
[custom.claude]
command = '"$HOME/.dotfiles/bin/claude-usage" --prompt'
when = true
format = "[$output](blue)[ │](dim) "

[custom.codex]
command = '"$HOME/.dotfiles/bin/codex-usage" --short'
when = 'test -d "$HOME/.codex/sessions"'
format = "[ᛢ $output](orange)[ │](dim) "

# Background jobs, non-zero exits, and in-progress rebases — the things only
# the shell knows. Matches the bridge preset.
[jobs]
symbol = "⚙ "
number_threshold = 1
format = "[$symbol$number](orange) | "

[status]
disabled = false
symbol = "✗"
format = "[$symbol$status](orange) | "

[git_state]
format = "[$state( $progress_current/$progress_total)](bold orange) "

[custom.opencode]
command = '"$HOME/.dotfiles/bin/opencode-usage" --short'
when = 'test -n "$("$HOME/.dotfiles/bin/opencode-usage" --short 2>/dev/null)"'
format = "[◆ $output](white) | "
