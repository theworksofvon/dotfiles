# tmux — mainly for session persistence: detach with C-b d, reattach with
# `tmux a`, and long-running work survives closing the terminal.
#
# Prefix is the default C-b, so every tutorial and cheatsheet applies as-is.

# ── colors ────────────────────────────────────────
# Ghostty is truecolor, but tmux won't pass RGB through unless told which
# outer terminal it's talking to.
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB"
set -g allow-passthrough on

# ── behavior ──────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1                # windows start at 1, matching the keyboard
setw -g pane-base-index 1
set -g renumber-windows on         # no gaps after closing a window
set -g escape-time 10              # don't lag after pressing Esc in vim
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S · #W"
setw -g mode-keys vi

# ── keys ──────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# Splits that keep the current directory, with intuitive glyphs:
# C-b | splits vertically, C-b - splits horizontally.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Move between panes with prefix + vim keys.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode behaves like vim; y copies to the macOS clipboard.
# (Modern macOS needs no reattach-to-user-namespace wrapper.)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ── appearance ────────────────────────────────────
# Palette matches the BRIDGE starship prompt.
%hidden CYAN="#7dd3fc"
%hidden BLUE="#7aa2f7"
%hidden WHITE="#c0caf5"
%hidden ORANGE="#ff9e64"
%hidden DIM="#3b4261"
%hidden BG="#1a1b26"

set -g status-position bottom
set -g status-style "bg=#{BG},fg=#{WHITE}"
set -g status-left "#[fg=#{BG},bg=#{CYAN},bold] #S #[fg=#{CYAN},bg=#{BG}] "
set -g status-left-length 30
set -g status-right "#[fg=#{DIM}]#{?client_prefix,#[fg=#{ORANGE}]● ,}#[fg=#{DIM}]%R "
set -g status-justify left

setw -g window-status-format "#[fg=#{DIM}] #I #W "
setw -g window-status-current-format "#[fg=#{CYAN},bold] #I #W "
setw -g window-status-activity-style "fg=#{ORANGE}"

# Dim inactive panes so the focused one is obvious.
set -g window-style "fg=#565f89"
set -g window-active-style "fg=#{WHITE}"
set -g pane-border-style "fg=#{DIM}"
set -g pane-active-border-style "fg=#{BLUE}"

set -g message-style "bg=#{BLUE},fg=#{BG}"
set -g monitor-activity on
set -g visual-activity off
